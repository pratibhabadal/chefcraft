    <style>
        *{

            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial,sans-serif;
            background:#f8f9fa;
            color:#333;
        }

        .navbar{
            background:#8b0000;
            color:white;
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:15px 40px;
        }

        .navbar h1{
            font-size:28px;
        }

        .navbar nav a{
            color:white;
            text-decoration:none;
            margin-left:20px;
            font-weight:bold;
        }

        .navbar nav a:hover{

        }

        main{

            margin:2rem auto;
            padding:0 1rem;
        }

        .section-title{
            text-align:center;
            margin-bottom:30px;
            color:#8b0000;
            font-size:32px;
        }
        .recipe-list{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:25px;
}

.recipe-card{
    background:#fff;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
    transition:.3s;
    text-align:center;
}

.recipe-card:hover{
    transform:translateY(-5px);
}

.recipe-card a{
    text-decoration:none;
    color:#8b0000;
    display:block;
}

.recipe-image{
    width:100%;
    height:220px;
    object-fit:cover;
}

.recipe-card h3{
    padding:15px;
    font-size:20px;
}

        footer{
            margin-top:40px;
            background:#8b0000;
            color:white;
            text-align:center;
            padding:15px;
        }
    </style>
</head>

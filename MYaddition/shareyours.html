<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share your Recipe</title>
    <link rel="stylesheet" href="share.css">
</head>
<body>
    <main>
        <section id="recipeform">
            <h1>Share your Favourite</h1>
            <p>Joins thousands of home cooks - submit your trusted receipe and inspire others</p>
            <ul>
                
                <li>
                    <i class="fa-regular fa-circle-check"</i>
                        Get featured on our site
                        </li>
                        <li>
                    <i class="fa-regular fa-circle-check"</i>
                        Become part of our community
                        </li>
                         <i class="fa-regular fa-heart"</i>
                        Share your family Favourite
                        </li>
                        </ul>

            <h2>Add your receipe</h2>
            <form id="shareyours">
                <div>
            <label> <i class="fa-regular fa-heart"></i>Recipe tittle</label>  
          <input type ="text"id="Recipe tittle"placeholder="eg.alu paratha"required>
                </div>
                 <div>
            <label> <i class="fa-regular fa-note-sticky"></i>Short Description</label>  
          <textarea id="Recipe Description"row="3"placeholder="what make it special?"></textarea>
                </div>
                <div>
            <label> <i class="fa-regular fa-heart"></i>Ingredients</label>  
          <input type ="text"id="Ingredientsinput"placeholder="eg.2 cups flour"required>
          <button type ="button"class="add-btn"id="Ingredientsinputbtn">
            <i class ="fa-regular fa-plus"></i>
          </button>
                </div>
                <div>
            <label> <i class="fa-regular fa-note-sticky"></i>Instructions</label>  
          <textarea id="RecipeInstructions"row="5"placeholder="Step by step..."></textarea>
                </div>
                <div>
                <label> <i class="fa-regular fa-user"></i>Your name</label>  
          <input type="text"id="chefname"placeholder="eg.Raksha hamal"required>
                </div>
            <button type ="submit"class="btn-primary">
                <i class="fa-regular fa-share-from-square"></i>Share receipe
            </button>    

        </form>
            </section>
        </main>
        <script>
           

        </script>
</body>
</html>
